server:
  port: 8083

spring:
  application:
    name: ms-carrito

  datasource:
    url: jdbc:postgresql://localhost:5432/optica_carrito
    username: postgres
    password: Konecta1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    pe.edu.cibertec.carrito: DEBUG
    org.hibernate.SQL: DEBUG

# Configuraci�n para comunicarse con otros microservicios
microservices:
  catalogo:
    url: http://ms-catalogo
  seguridad:
    url: http://ms-seguridad

