server:
  port: 8081

spring:
  application:
    name: ms-seguridad

  datasource:
    url: jdbc:postgresql://localhost:5432/optica_seguridad
    username: postgres
    password: Konecta1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    pe.edu.cibertec.seguridad: DEBUG
    org.hibernate.SQL: DEBUG

