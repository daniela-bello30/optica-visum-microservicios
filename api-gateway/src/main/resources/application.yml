server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Ruta para MS-SEGURIDAD
        - id: ms-seguridad
          uri: lb://MS-SEGURIDAD
          predicates:
            - Path=/api/seguridad/**
          filters:
            - StripPrefix=2

        # Ruta para MS-CATALOGO
        - id: ms-catalogo
          uri: lb://MS-CATALOGO
          predicates:
            - Path=/api/catalogo/**
          filters:
            - StripPrefix=2

        # Ruta para MS-CARRITO
        - id: ms-carrito
          uri: lb://MS-CARRITO
          predicates:
            - Path=/api/carrito/**
          filters:
            - StripPrefix=2

        # Ruta para MS-VENTAS
        - id: ms-ventas
          uri: lb://MS-VENTAS
          predicates:
            - Path=/api/ventas/**
          filters:
            - StripPrefix=2

        # Ruta para MS-CITAS
        - id: ms-citas
          uri: lb://MS-CITAS
          predicates:
            - Path=/api/citas/**
          filters:
            - StripPrefix=2

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true