<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISUM - Óptica Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }

        /* HEADER Y BIENVENIDA */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }
        .top-nav {
            position: absolute;
            top: 20px;
            right: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .user-greeting { font-weight: bold; font-size: 16px; }
        .btn-nav {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-nav:hover { background: white; color: #764ba2; }
        .btn-logout { background: #ff4757; border-color: #ff4757; }
        .btn-logout:hover { background: #ff6b81; color: white; border-color: #ff6b81; }

        .hero h1 { font-size: 48px; margin-bottom: 20px; }
        .hero p { font-size: 20px; opacity: 0.9; max-width: 600px; margin: 0 auto; }

        /* TARJETAS */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .section-title { text-align: center; font-size: 32px; color: #333; margin-bottom: 40px; }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        .service-card {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            cursor: pointer;
        }
        .service-card:hover { transform: translateY(-10px); box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3); }
        .service-icon { font-size: 60px; margin-bottom: 20px; }
        .service-card h3 { color: #667eea; font-size: 24px; margin-bottom: 15px; }
        .service-card p { color: #666; line-height: 1.6; }

        .footer { background: #2c3e50; color: white; padding: 40px 20px; text-align: center; margin-top: 60px; }
    </style>
</head>
<body>

<div class="hero">
    <!-- BARRA SUPERIOR DE SESIÓN -->
    <div class="top-nav" id="authNav">
        <!-- Se llena con Javascript -->
    </div>

    <h1>👓 VISUM</h1>
    <p>Tu óptica de confianza. Encuentra los mejores lentes, agenda tu cita y compra online</p>
</div>

<div class="container">
    <h2 class="section-title">Nuestros Servicios</h2>

    <div class="services-grid">
        <a href="http://localhost:8080/catalogo.html" class="service-card">...</a>

        <a onclick="verificarAcceso('http://localhost:8080/carrito.html')" class="service-card">...</a>

        <a onclick="verificarAcceso('http://localhost:8080/citas.html')" class="service-card">...</a>

        <a onclick="verificarAcceso('http://localhost:8080/pedidos.html')" class="service-card">...</a>

        <a id="tarjetaCuenta" href="http://localhost:8080/login.html" class="service-card">...</a>

        <a href="http://localhost:8080/sucursales.html" class="service-card">...</a>
    </div>
</div>

<div class="footer">
    <h3>VISUM - Sistema de Microservicios</h3>
    <p>Proyecto de Desarrollo de Servicios Web 2</p>
</div>

<script>
    // 1. Cuando la página carga, validamos si hay sesión activa
    document.addEventListener('DOMContentLoaded', () => {
        const usuarioStr = localStorage.getItem('usuario');
        const authNav = document.getElementById('authNav');
        const tarjetaCuenta = document.getElementById('tarjetaCuenta');

        if (usuarioStr) {
            // SÍ HAY SESIÓN
            const usuario = JSON.parse(usuarioStr);

            // Ponemos el nombre arriba a la derecha y el botón salir
            authNav.innerHTML = `
                <span class="user-greeting">👋 Hola, ${usuario.nombres}</span>
                <button onclick="cerrarSesion()" class="btn-nav btn-logout">Cerrar Sesión</button>
            `;

            // Cambiamos la tarjeta de "Mi cuenta"
            document.getElementById('textoCuentaTitulo').textContent = 'Mi Perfil';
            document.getElementById('textoCuentaDesc').textContent = `Logueado como: ${usuario.email}`;
            tarjetaCuenta.href = "#"; // Ya no lo lleva al login
        } else {
            // NO HAY SESIÓN
            authNav.innerHTML = `
                <a href="http://localhost:8081/login.html" class="btn-nav">Iniciar Sesión</a>
                <a href="http://localhost:8081/register.html" class="btn-nav">Registrarse</a>
            `;
        }
    });

    // 2. Función para proteger botones (Carrito, Pedidos, Citas)
    function verificarAcceso(urlDestino) {
        const usuarioStr = localStorage.getItem('usuario');
        if (!usuarioStr) {
            alert('⚠️ Debes iniciar sesión para acceder a esta función.');
            window.location.href = 'http://localhost:8081/login.html';
        } else {
            window.location.href = urlDestino;
        }
    }

    // 3. Función para cerrar sesión
    function cerrarSesion() {
        if(confirm('¿Estás seguro que deseas cerrar sesión?')) {
            localStorage.removeItem('usuario'); // Borramos los datos
            window.location.reload(); // Recargamos la página
        }
    }
</script>
</body>
</html>
