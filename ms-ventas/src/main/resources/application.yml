server:
  port: 8084

spring:
  application:
    name: ms-ventas

  datasource:
    url: jdbc:postgresql://localhost:5432/optica_ventas
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    pe.edu.cibertec.ventas: DEBUG
    org.hibernate.SQL: DEBUG

# Configuraciˇn para comunicarse con otros microservicios
microservices:
  catalogo:
    url: http://ms-catalogo
  carrito:
    url: http://ms-carrito
  seguridad:
    url: http://ms-seguridad
