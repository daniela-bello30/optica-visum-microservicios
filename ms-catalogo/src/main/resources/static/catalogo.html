<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - VISUM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
        }

        .search-bar button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .search-bar button:hover {
            background: #5568d3;
        }

        .filters {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filters select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .product-description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }

        .product-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .product-discount {
            background: #ff4757;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .product-stock {
            font-size: 0.9rem;
            color: #4CAF50;
        }

        .product-stock.low {
            color: #ff9800;
        }

        .product-stock.out {
            color: #f44336;
        }

        .product-badges {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-new {
            background: #4CAF50;
            color: white;
        }

        .badge-featured {
            background: #FFC107;
            color: #333;
        }

        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .add-to-cart:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5rem;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .empty {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 10px;
            color: #666;
        }

        .category-pill {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🕶️ Catálogo VISUM</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Buscar productos por nombre o descripción...">
            <button onclick="buscarProductos()">Buscar</button>
            <button onclick="cargarProductos()">Ver Todos</button>
        </div>
    </header>

    <div class="filters">
        <select id="filterCategoria" onchange="aplicarFiltros()">
            <option value="">Todas las categorías</option>
        </select>
        <select id="filterMarca" onchange="aplicarFiltros()">
            <option value="">Todas las marcas</option>
        </select>
        <select id="filterGenero" onchange="aplicarFiltros()">
            <option value="">Todos los géneros</option>
            <option value="Hombre">Hombre</option>
            <option value="Mujer">Mujer</option>
            <option value="Unisex">Unisex</option>
        </select>
    </div>

    <div id="productosContainer">
        <div class="loading">⏳ Cargando productos...</div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8083/carrito';

    // 1. LEER EL USUARIO DESDE LA URL (El Truco Mágico)
    const urlParams = new URLSearchParams(window.location.search);
    const ID_USUARIO = parseInt(urlParams.get('userId'));
    const nombreUsuario = urlParams.get('nombre');
    const emailUsuario = urlParams.get('email');

    async function agregarAlCarrito(idProducto) {

        // Si no hay ID en la URL, lo mandamos a loguearse
        if (!ID_USUARIO) {
            alert("⚠️ Debes iniciar sesión para agregar productos al carrito.");
            window.location.href = 'http://localhost:8081/login.html';
            return;
        }

        const cantidad = 1; // Faltaba esta variable

        // URL del microservicio de Carrito (Puerto 8083)
        const URL_AGREGAR = `http://localhost:8083/carrito/${ID_USUARIO}/agregar?idProducto=${idProducto}&cantidad=${cantidad}`;

        try {
            // Hacemos la petición POST al Carrito
            const response = await fetch(URL_AGREGAR, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const jsonResponse = await response.json();

            // Verificamos si la API nos respondió con éxito
            if (response.ok && jsonResponse.success) {
                // Preguntamos al usuario si quiere ir a pagar
                if (confirm('✅ ¡' + jsonResponse.message + '!\n\n¿Deseas ir a tu carrito ahora?')) {

                    // MUY IMPORTANTE: Saltamos al carrito pasándole los datos en la URL
                    window.location.href = `http://localhost:8083/carrito.html?userId=${ID_USUARIO}&nombre=${nombreUsuario}&email=${emailUsuario}`;
                }
            } else {
                alert('❌ Error al agregar al carrito: ' + (jsonResponse.message || 'Error desconocido'));
            }
        } catch (error) {
            console.error('Error al conectar con el carrito:', error);
            alert('❌ Error de conexión. ¿Verificaste que el MS-CARRITO (puerto 8083) esté encendido?');
        }
    }

    window.onload = cargarCarrito;

    async function cargarCarrito() {
        try {
            const response = await fetch(`${API_URL}/${ID_USUARIO}`);
            const jsonResponse = await response.json(); // Corregido: antes decía 'respuesta'
            const carrito = jsonResponse.data;
            mostrarCarrito(carrito);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function mostrarCarrito(carrito) {
        const container = document.getElementById('cartItems');
        const summary = document.getElementById('cartSummary');

        if (!carrito || !carrito.items || carrito.items.length === 0) {
            container.innerHTML = `
                    <div class="empty-cart">
                        <h2>Tu carrito está vacío</h2>
                        <p>Agrega productos para comenzar tu compra</p>
                    </div>
                `;
            summary.style.display = 'none';
            return;
        }

        container.innerHTML = carrito.items.map(item => `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-name">${item.nombreProducto}</div>
                        <div class="item-price">S/ ${item.precioUnitario.toFixed(2)} c/u</div>
                    </div>
                    <div class="quantity-controls">
                        <button class="quantity-btn" onclick="actualizarCantidad(${item.idProducto}, ${item.cantidad - 1})">-</button>
                        <span class="quantity">${item.cantidad}</span>
                        <button class="quantity-btn" onclick="actualizarCantidad(${item.idProducto}, ${item.cantidad + 1})">+</button>
                    </div>
                    <div class="item-subtotal">S/ ${item.subtotal.toFixed(2)}</div>
                    <button class="remove-btn" onclick="eliminarProducto(${item.idProducto})">Eliminar</button>
                </div>
            `).join('');

        document.getElementById('itemCount').textContent = carrito.cantidadItems;
        document.getElementById('totalAmount').textContent = 'S/ ' + carrito.total.toFixed(2);
        summary.style.display = 'block';
    }

    async function actualizarCantidad(idProducto, nuevaCantidad) {
        if (nuevaCantidad < 1) return;

        try {
            const response = await fetch(
                `${API_URL}/${ID_USUARIO}/actualizar?idProducto=${idProducto}&cantidad=${nuevaCantidad}`,
                { method: 'PUT' }
            );
            const jsonResponse = await response.json();
            const carrito = jsonResponse.data;
            mostrarCarrito(carrito);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function eliminarProducto(idProducto) {
        try {
            await fetch(`${API_URL}/${ID_USUARIO}/eliminar/${idProducto}`, {
                method: 'DELETE'
            });
            cargarCarrito();
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function procederAlPago() {
        // Al ir al Checkout, LE PASAMOS LOS DATOS EN LA URL PARA NO PERDER LA SESIÓN
        window.location.href = `http://localhost:8084/checkout.html?userId=${ID_USUARIO}&nombre=${nombreUsuario}&email=${emailUsuario}`;
    }
</script>
</body>
</html>
